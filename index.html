<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, height=1080, initial-scale=1.0">
<title>OneBeat</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
  canvas {
    display: block;
    position: absolute;
    top: 50%; left: 50%;
    /* ROTATE_FOR_LANDSCAPE: rotated 90° so portrait canvas fills landscape display */
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<script>
// ============================================================
// CONFIG – all tunable constants
// ============================================================
const CFG = {
  // Canvas / display
  W: 1080,
  H: 1920,
  ROTATE_FOR_LANDSCAPE: true, // rotate canvas 90° to fill a landscape (16:9) screen

  // Dev overlays (browser-only; ignored on BrightSign)
  DEV_SHOW_INFO:    true,   // status panel (state, buttons, water Y …)
  DEV_SHOW_BUTTONS: true,   // on-screen toggle buttons
  WATER_DECO_FALLBACK: false, // draw generated shapes when PNG not loaded (disable to hide missing assets)

  COLOR_IDLE_BG:     '#D8DDB5',
  COLOR_ACTIVE_BG:   '#D8DDB5',
  COLOR_WATER_IDLE:  '#5B7F39',//'#6C984D',
  COLOR_WATER_ACTIVE: '#5B7F39',//'#6C984D',
  WATER_FILL_ALPHA:   0.85,       // opacity of water body fill
  WATER_LINE_ALPHA:   0.9,       // opacity of surface line
  COLOR_BUBBLE_IDLE: '#F5F2E8',
  COLOR_BUBBLE_ACTIVE: '#6C984D',
  COLOR_BUBBLE_RING: '#3D5C24',


  // Water
  // Water level per button count (fraction of canvas H, top of water surface)
  // Index = number of active buttons (0 = none, 8 = all). Lower value = higher water.
  WATER_LEVELS: [1.05, 0.84, 0.76, 0.64, 0.52, 0.40, 0.28, 0.17, 0.08],
  WATER_WAVE_AMP1: 12,
  WATER_WAVE_AMP2: 8,
  WATER_WAVE_FREQ1: 0.008,
  WATER_WAVE_FREQ2: 0.013,
  WATER_WAVE_SPEED1: 1.5,
  WATER_WAVE_SPEED2: -1.0,
  WATER_LERP_SPEED: 0.02,
  WATER_BUBBLE_COUNT: 20,
  WATER_BUBBLE_MIN_R: 2,
  WATER_BUBBLE_MAX_R: 10,
  WATER_BUBBLE_SPEED: 0.4,

  // Background network
  BG_DOT_COUNT: 50,          // fewer dots = O(n²) shrinks fast: 50→ 1225 pairs vs 100→ 4950
  BG_DOT_SPEED: 0.3,
  BG_CONNECT_DIST: 180,      // shorter reach = fewer connections drawn
  BG_DOT_RADIUS: 3,
  BG_LINE_WIDTH: 2,
  BG_LINE_ALPHA: 0.7,
  BG_DOT_ALPHA: 0.75,

  // State transitions
  BG_COLOR_LERP: 0.03,

  // PNG assets
  USE_PNG_ASSETS: true,           // set false to use generated shapes instead

  // PNG bubble animation
  BUBBLE_SPAWN_DURATION: 4000,   // ms total lifecycle
  BUBBLE_FADE_IN: 400,           // ms
  BUBBLE_TEXT_FADE_OUT: 2000,     // ms before end
  BUBBLE_FADE_OUT: 400,          // ms at end
  BUBBLE_DRIFT_Y: 900,           // px drift down
  BUBBLE_SHRINK: 0.2,            // final scale factor
  BUBBLE_START_RADIUS: 300,

  // Full state
  FULL_TIMEOUT: 2000,            // ms delay before entering FULL state

  // Center bubble fade
  CENTER_BUBBLE_FADE_IN: 0.03,   // lerp speed toward alpha 1 (smaller = slower)
  CENTER_BUBBLE_FADE_OUT: 0.03,  // lerp speed toward alpha 0 (smaller = slower)

  // Idle rotation
  IDLE_ROTATE_SPEED: 0.0003,     // radians per ms (base speed)
  // Layer rotation speed multipliers (positive = CW, negative = CCW)
  LAYER_SPEEDS: [0.02, -0.1, 0.1, -0.05],

  // Circle decorations (idle state)
  IDLE_DECOR_COUNT: 12,
  IDLE_DECOR_MIN_R: 8,
  IDLE_DECOR_MAX_R: 30,

  // Water decoration bubbles (count-driven, inside water)
  WATER_DECO_BIG_R: 55,          // radius of big decoration bubble
  WATER_DECO_SMALL_R: 27,        // radius of small decoration bubble
  WATER_DECO_SPAWN_DELAY: 3000,  // ms delay after button press before appearing
  WATER_DECO_WOBBLE_SPEED1: 0.0004, // big bubble wobble frequency (rad/ms)
  WATER_DECO_WOBBLE_SPEED2: 0.0003, // small bubble wobble frequency (rad/ms)
  WATER_DECO_WOBBLE_AMP1: 50,     // big bubble vertical wobble amplitude (px)
  WATER_DECO_WOBBLE_AMP2: 40,     // small bubble vertical wobble amplitude (px)
};

// ============================================================
// ASSET PRELOADER
// ============================================================
// Mapping: index 0-7 → { bubble: Image, text: Image }
// All touch bubbles share one bubble PNG for performance; text layers remain unique.
const BUBBLE_IMGS = [];

function loadImg(src) {
  const img = new Image();
  img.src = src;
  return img;
}

const _sharedBubbleImg = loadImg('assets/Bubble_1.png');
for (let i = 0; i < 8; i++) {
  const n = i + 1;
  BUBBLE_IMGS.push({
    bubble: _sharedBubbleImg,
    text:   loadImg(`assets/Text_${n}.png`),
  });
}

// Center bubble images for Idle and Full states
// Idle: 2 static layers (bubble base + text) + 4 rotating Layer PNGs
const CENTER_IMGS = {
  idle: {
    bubble: loadImg('assets/Bubble_idle.png'),
    layers: [
      loadImg('assets/Layer1.png'),
      loadImg('assets/Layer2.png'),
      loadImg('assets/Layer3.png'),
      loadImg('assets/Layer4.png'),
    ],
    text: loadImg('assets/Text_idle.png'),
  },
  full: { bubble: loadImg('assets/Bubble_full.png'), text: loadImg('assets/Text_full.png') },
};

const WATER_DECO_IMGS = {
  big:   loadImg('assets/WaterBubble_big.png'),
  small: loadImg('assets/WaterBubble_small.png'),
};

// ============================================================
// CANVAS SETUP
// ============================================================
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = CFG.W;
canvas.height = CFG.H;

function fitCanvas() {
  if (CFG.ROTATE_FOR_LANDSCAPE) {
    // Portrait canvas (W×H) rotated 90° fills landscape screen (H×W).
    // Scale so the rotated canvas fits the actual viewport.
    const scale = Math.min(window.innerWidth / CFG.H, window.innerHeight / CFG.W);
    canvas.style.width  = CFG.W + 'px';
    canvas.style.height = CFG.H + 'px';
    canvas.style.transform = `translate(-50%, -50%) rotate(90deg) scale(${scale})`;
  } else {
    const scale = Math.min(window.innerWidth / CFG.W, window.innerHeight / CFG.H);
    canvas.style.width  = (CFG.W * scale) + 'px';
    canvas.style.height = (CFG.H * scale) + 'px';
    canvas.style.transform = 'translate(-50%, -50%)';
  }
}
fitCanvas();
window.addEventListener('resize', fitCanvas);

// ============================================================
// INPUT ABSTRACTION
// ============================================================
const buttons = new Array(8).fill(false);
let activeCount = 0;

function updateActiveCount() {
  activeCount = buttons.filter(Boolean).length;
}

function onButtonDown(idx) {
  if (idx < 0 || idx > 7 || buttons[idx]) return;
  buttons[idx] = true;
  updateActiveCount();
  spawnPNGBubble(idx);
  onStateChange();
}

function onButtonUp(idx) {
  if (idx < 0 || idx > 7 || !buttons[idx]) return;
  buttons[idx] = false;
  updateActiveCount();
  onStateChange();
}

// -- Keyboard simulation (dev) --
const KEY_MAP = { '1':0, '2':1, '3':2, '4':3, '5':4, '6':5, '7':6, '8':7 };

document.addEventListener('keydown', (e) => {
  if (e.repeat) return;
  const idx = KEY_MAP[e.key];
  if (idx !== undefined) onButtonDown(idx);
});

document.addEventListener('keyup', (e) => {
  const idx = KEY_MAP[e.key];
  if (idx !== undefined) onButtonUp(idx);
});

// -- File logger: writes to SD:/dist/bs-log.txt for offline debugging --
let _fsLog;
try {
  const _fsForLog = require('fs');
  const _logPath = '/storage/sd/dist/bs-log.txt';
  _fsForLog.writeFileSync(_logPath, '--- BrightSign log start ---\n');
  _fsLog = function(msg) {
    try { _fsForLog.appendFileSync(_logPath, new Date().toISOString() + ' ' + msg + '\n'); } catch(e) {}
  };
  const _origLog = console.log, _origWarn = console.warn;
  console.log = function() { const m = Array.from(arguments).join(' '); _origLog(m); _fsLog('[LOG] ' + m); };
  console.warn = function() { const m = Array.from(arguments).join(' '); _origWarn(m); _fsLog('[WARN] ' + m); };
} catch(e) {}

// -- Serial input via Node.js fs (BrightSign OS9, nodejs_enabled: true) --
// Nexmosphere XN-185 / XT-1GW6 ASCII protocol:
// Format: X{addr}A[{value}]\r\n  — value 3=press, 0=release, addr 001-008
function parseNexmoLine(line) {
  const m = line.match(/^X(\d+)A\[(\d+)\]$/);
  if (!m) return;
  const addr = parseInt(m[1]);
  const val  = parseInt(m[2]);
  const idx  = addr - 1; // 0-based
  if (idx < 0 || idx > 7) return;
  if (val === 3) {
    console.log('Button', addr, 'PRESS');
    onButtonDown(idx);
    if (window._arduinoWrite) window._arduinoWrite(addr + '+');
  } else if (val === 0) {
    console.log('Button', addr, 'RELEASE');
    onButtonUp(idx);
    if (window._arduinoWrite) window._arduinoWrite(addr + '-');
  }
}

try {
  const fs = require('fs');
  const { execSync } = require('child_process');

  // Discover available serial devices
  try {
    const devs = fs.readdirSync('/dev').filter(f => f.startsWith('ttyS') || f.startsWith('ttyUSB') || f.startsWith('ttyAMA'));
    console.log('Available serial devices:', devs.join(', '));
  } catch(e) { console.warn('Cannot list /dev:', e.message); }

  // BrightScript port 0 = likely /dev/ttyS1 on BrightSign (ttyS0 is system console)
  // Try ttyS1 first, fallback to ttyS0
  const TOUCH_DEV = '/dev/ttyUSB0';
  const TOUCH_BAUD = 115200;

  try { execSync('stty -F ' + TOUCH_DEV + ' ' + TOUCH_BAUD + ' cs8 -cstopb -parenb raw -echo'); } catch(e) { console.warn('stty ' + TOUCH_DEV + ':', e.message); }

  console.log('Opening', TOUCH_DEV, 'at', TOUCH_BAUD, 'baud');
  let lineBuf = '';
  const serialStream = fs.createReadStream(TOUCH_DEV, { highWaterMark: 64 });
  serialStream.on('data', function(chunk) {
    lineBuf += chunk.toString('ascii');
    let nl;
    while ((nl = lineBuf.indexOf('\n')) !== -1) {
      const line = lineBuf.substring(0, nl).replace(/\r$/, '');
      lineBuf = lineBuf.substring(nl + 1);
      console.log('Serial line:', line);
      parseNexmoLine(line);
    }
  });
  serialStream.on('error', function(e) {
    console.warn('Serial', TOUCH_DEV, 'error:', e.message);
  });

  // Arduino Nano output (ttyUSB1, 115200 baud)
  try {
    execSync('stty -F /dev/ttyUSB1 115200 cs8 -cstopb -parenb raw -echo');
    const arduinoFd = fs.openSync('/dev/ttyUSB1', 'w');
    window._arduinoWrite = function(cmd) {
      try { fs.writeSync(arduinoFd, cmd + '\n'); } catch(e) {}
    };
    console.log('Arduino ttyUSB1 ready');
  } catch(e) { console.warn('Arduino ttyUSB1 not available:', e.message); }

} catch(e) {
  console.warn('Serial not available (non-BrightSign env):', e);
}

// ============================================================
// STATE MACHINE
// ============================================================
const STATE = { IDLE: 0, ACTIVE: 1, FULL: 2 };
let currentState = STATE.IDLE;
let fullTimeout = null;

function onStateChange() {
  const prevState = currentState;

  if (activeCount === 0) {
    if (fullTimeout) { clearTimeout(fullTimeout); fullTimeout = null; }
    currentState = STATE.IDLE;
    fullAlpha = 0;
  } else if (activeCount < 8) {
    if (fullTimeout) { clearTimeout(fullTimeout); fullTimeout = null; }
    currentState = STATE.ACTIVE;
    fullAlpha = 0;
  } else {
    // All 8 pressed — stay in ACTIVE briefly, then transition to FULL
    if (currentState !== STATE.FULL && !fullTimeout) {
      fullTimeout = setTimeout(() => {
        currentState = STATE.FULL;
        fullTimeout = null;
      }, CFG.FULL_TIMEOUT);
    }
  }
}

// ============================================================
// COLOR UTILITIES
// ============================================================
function hexToRgb(hex) {
  const r = parseInt(hex.slice(1, 3), 16);
  const g = parseInt(hex.slice(3, 5), 16);
  const b = parseInt(hex.slice(5, 7), 16);
  return [r, g, b];
}

function rgbToStr(rgb) {
  return `rgb(${Math.round(rgb[0])},${Math.round(rgb[1])},${Math.round(rgb[2])})`;
}

function rgbaToStr(rgb, a) {
  return `rgba(${Math.round(rgb[0])},${Math.round(rgb[1])},${Math.round(rgb[2])},${a})`;
}

function lerpRgb(a, b, t) {
  return [
    a[0] + (b[0] - a[0]) * t,
    a[1] + (b[1] - a[1]) * t,
    a[2] + (b[2] - a[2]) * t,
  ];
}

function lerp(a, b, t) { return a + (b - a) * t; }
function clamp(v, min, max) { return Math.max(min, Math.min(max, v)); }

const RGB_IDLE_BG = hexToRgb(CFG.COLOR_IDLE_BG);
const RGB_ACTIVE_BG = hexToRgb(CFG.COLOR_ACTIVE_BG);
const RGB_WATER_IDLE = hexToRgb(CFG.COLOR_WATER_IDLE);
const RGB_WATER_ACTIVE = hexToRgb(CFG.COLOR_WATER_ACTIVE);

let currentBgRgb = [...RGB_IDLE_BG];

// ============================================================
// BACKGROUND NETWORK ANIMATION
// ============================================================
class Dot {
  constructor() { this.reset(true); }

  reset(initial) {
    this.x = Math.random() * CFG.W;
    this.y = Math.random() * CFG.H;
    const angle = Math.random() * Math.PI * 2;
    const speed = (Math.random() * 0.5 + 0.5) * CFG.BG_DOT_SPEED;
    this.vx = Math.cos(angle) * speed;
    this.vy = Math.sin(angle) * speed;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    // Wrap around
    if (this.x < -20) this.x = CFG.W + 20;
    if (this.x > CFG.W + 20) this.x = -20;
    if (this.y < -20) this.y = CFG.H + 20;
    if (this.y > CFG.H + 20) this.y = -20;
  }
}

// Create dots with cluster-like distribution
const bgDots = [];
function initBgDots() {
  // Create cluster centers
  const clusterCount = 5 + Math.floor(Math.random() * 3);
  const clusters = [];
  for (let i = 0; i < clusterCount; i++) {
    clusters.push({
      x: Math.random() * CFG.W,
      y: Math.random() * CFG.H,
      r: 100 + Math.random() * 200,
    });
  }

  for (let i = 0; i < CFG.BG_DOT_COUNT; i++) {
    const dot = new Dot();
    // 70% chance to place near a cluster
    if (Math.random() < 0.7) {
      const cl = clusters[Math.floor(Math.random() * clusters.length)];
      const ang = Math.random() * Math.PI * 2;
      const dist = Math.random() * cl.r;
      dot.x = cl.x + Math.cos(ang) * dist;
      dot.y = cl.y + Math.sin(ang) * dist;
      // Clamp to screen
      dot.x = clamp(dot.x, 0, CFG.W);
      dot.y = clamp(dot.y, 0, CFG.H);
    }
    bgDots.push(dot);
  }
}
initBgDots();

// Pre-allocated bucket arrays — reused every frame to avoid GC pressure
const _bgBuckets = Array.from({ length: 8 }, () => []);
let _bgSkipFrame = false;

function drawBackground() {
  // Determine line/dot color based on current bg (contrast)
  const brightness = (currentBgRgb[0] * 299 + currentBgRgb[1] * 587 + currentBgRgb[2] * 114) / 1000;
  const lineColor = brightness > 140
    ? [currentBgRgb[0] * 0.7, currentBgRgb[1] * 0.7, currentBgRgb[2] * 0.7]
    : [currentBgRgb[0] * 1.3, currentBgRgb[1] * 1.3, currentBgRgb[2] * 1.3];

  // Always move dots, but only rebuild+draw connections every 2nd frame
  for (const dot of bgDots) dot.update();
  _bgSkipFrame = !_bgSkipFrame;
  if (_bgSkipFrame) return;

  // Draw connections — batch all lines sharing the same alpha bucket into one path
  const BUCKETS = 8;
  const bucketPaths = _bgBuckets;
  for (let b = 0; b < BUCKETS; b++) bucketPaths[b].length = 0; // clear without re-allocating
  ctx.lineWidth = CFG.BG_LINE_WIDTH;
  const connectDistSq = CFG.BG_CONNECT_DIST * CFG.BG_CONNECT_DIST;
  for (let i = 0; i < bgDots.length; i++) {
    for (let j = i + 1; j < bgDots.length; j++) {
      const dx = bgDots[i].x - bgDots[j].x;
      const dy = bgDots[i].y - bgDots[j].y;
      const distSq = dx * dx + dy * dy;
      if (distSq < connectDistSq) {
        const alpha = (1 - Math.sqrt(distSq) / CFG.BG_CONNECT_DIST) * CFG.BG_LINE_ALPHA;
        const bucket = Math.min(BUCKETS - 1, Math.floor(alpha * BUCKETS));
        bucketPaths[bucket].push(bgDots[i].x, bgDots[i].y, bgDots[j].x, bgDots[j].y);
      }
    }
  }
  for (let b = 0; b < BUCKETS; b++) {
    const pts = bucketPaths[b];
    if (pts.length === 0) continue;
    const alpha = (b + 0.5) / BUCKETS * CFG.BG_LINE_ALPHA;
    ctx.strokeStyle = rgbaToStr(lineColor, alpha);
    ctx.beginPath();
    for (let p = 0; p < pts.length; p += 4) {
      ctx.moveTo(pts[p], pts[p + 1]);
      ctx.lineTo(pts[p + 2], pts[p + 3]);
    }
    ctx.stroke();
  }

  // Draw dots — batch all into one path (same color/size)
  ctx.fillStyle = rgbaToStr(lineColor, CFG.BG_DOT_ALPHA);
  ctx.beginPath();
  for (const dot of bgDots) {
    ctx.moveTo(dot.x + CFG.BG_DOT_RADIUS, dot.y);
    ctx.arc(dot.x, dot.y, CFG.BG_DOT_RADIUS, 0, Math.PI * 2);
  }
  ctx.fill();
}

// ============================================================
// WATER ANIMATION
// ============================================================
let waterTargetY = CFG.H * CFG.WATER_LEVELS[0];
let waterCurrentY = waterTargetY;
let waterTime = 0;

// Water bubbles
class WaterBubble {
  constructor() { this.reset(); }

  reset() {
    this.x = Math.random() * CFG.W;
    this.r = CFG.WATER_BUBBLE_MIN_R + Math.random() * (CFG.WATER_BUBBLE_MAX_R - CFG.WATER_BUBBLE_MIN_R);
    this.speed = (Math.random() * 0.5 + 0.5) * CFG.WATER_BUBBLE_SPEED;
    this.wobbleAmp = Math.random() * 3;
    this.wobbleFreq = 0.001 + Math.random() * 0.003;
    this.wobblePhase = Math.random() * Math.PI * 2;
    this.y = CFG.H + Math.random() * 100; // start below screen
  }

  update(surfaceY) {
    this.y -= this.speed;
    // Reset if above water surface
    if (this.y < surfaceY - 10) {
      this.reset();
      this.y = CFG.H + Math.random() * 50;
    }
  }
}

const waterBubbles = [];
for (let i = 0; i < CFG.WATER_BUBBLE_COUNT; i++) {
  waterBubbles.push(new WaterBubble());
}

// ============================================================
// WATER DECORATION BUBBLES (persistent, position-defined pairs)
// ============================================================
// Positions defined as fractions of canvas W/H (0-1).
// Index 0 = button 1 (appears first, bottommost), index 7 = button 8 (topmost).
// Bubbles are clipped to water surface — they become visible as water rises.
const WATER_DECO_POSITIONS = [
  { bigX: 0.137, bigY: 0.904, smallX: 0.372, smallY: 0.964 }, // pair 1
  { bigX: 0.777, bigY: 0.886, smallX: 0.625, smallY: 0.958 }, // pair 2
  { bigX: 0.316, bigY: 0.765, smallX: 0.540, smallY: 0.874 }, // pair 3
  { bigX: 0.758, bigY: 0.647, smallX: 0.886, smallY: 0.759 }, // pair 4
  { bigX: 0.158, bigY: 0.579, smallX: 0.347, smallY: 0.638 }, // pair 5
  { bigX: 0.537, bigY: 0.458, smallX: 0.796, smallY: 0.519 }, // pair 6
  { bigX: 0.191, bigY: 0.313, smallX: 0.349, smallY: 0.458 }, // pair 7
  { bigX: 0.830, bigY: 0.192, smallX: 0.597, smallY: 0.251 }, // pair 8
];

// Per-pair stable wobble phase offsets (fixed at page load)
const waterDecoWobble = Array.from({ length: 8 }, () => ({
  ph1: Math.random() * Math.PI * 2,
  ph2: Math.random() * Math.PI * 2,
}));

// Slots 0-7 map directly to WATER_DECO_POSITIONS — filled by count, not by button identity.
// Slot 0 = bottommost (first to appear), slot N-1 = topmost (last pressed).
const waterDecoBubbles = new Array(8).fill(null);
let waterDecoPrevCount = 0;

function syncWaterDecoBubbles() {
  const now = performance.now();
  const count = activeCount;

  if (count > waterDecoPrevCount) {
    // Buttons pressed: fill new slots from prev count up to count-1
    for (let slot = waterDecoPrevCount; slot < count; slot++) {
      const inheritAlpha = waterDecoBubbles[slot]?.alpha ?? 0;
      waterDecoBubbles[slot] = { alpha: inheritAlpha, removing: false, spawnAt: now + CFG.WATER_DECO_SPAWN_DELAY };
    }
  } else if (count < waterDecoPrevCount) {
    // Buttons released: mark topmost slots as removing
    for (let slot = count; slot < waterDecoPrevCount; slot++) {
      if (waterDecoBubbles[slot] && !waterDecoBubbles[slot].removing) {
        waterDecoBubbles[slot].removing = true;
      }
    }
  }

  waterDecoPrevCount = count;
}

function drawWaterDecoBubbleShape(x, y, r, img) {
  if (img && img.complete && img.naturalWidth > 0) {
    ctx.drawImage(img, x - img.naturalWidth / 2, y - img.naturalHeight / 2);
  } else if (CFG.WATER_DECO_FALLBACK) {
    // Generated fallback
    ctx.fillStyle = CFG.COLOR_BUBBLE_ACTIVE;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fill();

    ctx.strokeStyle = CFG.COLOR_BUBBLE_RING;
    ctx.lineWidth = Math.max(1.5, r * 0.07);
    ctx.beginPath();
    ctx.arc(x, y, r + Math.max(3, r * 0.12), 0, Math.PI * 2);
    ctx.stroke();

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.14)';
    ctx.lineWidth = r * 0.1;
    ctx.beginPath();
    ctx.arc(x, y - r * 0.15, r * 0.6, Math.PI * 1.1, Math.PI * 1.9);
    ctx.stroke();
    ctx.restore();
  }
}

function drawWaterDecorationBubbles(time) {
  const now = performance.now();
  syncWaterDecoBubbles();

  // Reuse wave points computed by drawWater (called before this each frame)
  const wavePoints = drawWater._wavePoints || [];

  // Build clip path once for all non-removing bubbles
  let clipReady = false;

  for (let i = 0; i < 8; i++) {
    const b = waterDecoBubbles[i];
    if (!b) continue;

    if (b.removing) {
      b.alpha = lerp(b.alpha, 0, 0.08);
      if (b.alpha < 0.01) { waterDecoBubbles[i] = null; continue; }
    } else if (now >= b.spawnAt) {
      b.alpha = lerp(b.alpha, 1, 0.04);
    }

    if (b.alpha < 0.005) continue;

    const pos = WATER_DECO_POSITIONS[i];
    const wob = waterDecoWobble[i];

    const wob1 = Math.sin(time * CFG.WATER_DECO_WOBBLE_SPEED1 + wob.ph1) * CFG.WATER_DECO_WOBBLE_AMP1;
    const wob2 = Math.sin(time * CFG.WATER_DECO_WOBBLE_SPEED2 + wob.ph2) * CFG.WATER_DECO_WOBBLE_AMP2;

    const bigX   = pos.bigX   * CFG.W;
    const bigY   = pos.bigY   * CFG.H + wob1;
    const smallX = pos.smallX * CFG.W;
    const smallY = pos.smallY * CFG.H + wob2;

    ctx.save();
    if (!b.removing) {
      // Apply shared clip once, then reuse by saving state before first clipped bubble
      if (!clipReady) {
        ctx.beginPath();
        ctx.moveTo(0, CFG.H);
        for (let p = 0; p < wavePoints.length; p += 2) ctx.lineTo(wavePoints[p], wavePoints[p + 1]);
        ctx.lineTo(CFG.W, CFG.H);
        ctx.closePath();
        ctx.clip();
        clipReady = true;
      } else {
        // Re-apply same clip (ctx.save/restore resets it each iteration)
        ctx.beginPath();
        ctx.moveTo(0, CFG.H);
        for (let p = 0; p < wavePoints.length; p += 2) ctx.lineTo(wavePoints[p], wavePoints[p + 1]);
        ctx.lineTo(CFG.W, CFG.H);
        ctx.closePath();
        ctx.clip();
      }
    }

    ctx.globalAlpha = b.alpha;
    drawWaterDecoBubbleShape(bigX,   bigY,   CFG.WATER_DECO_BIG_R,   WATER_DECO_IMGS.big);
    drawWaterDecoBubbleShape(smallX, smallY, CFG.WATER_DECO_SMALL_R, WATER_DECO_IMGS.small);

    ctx.restore();
  }
}

function drawWater(time) {
  // Update target Y based on active button count
  waterTargetY = CFG.WATER_LEVELS[activeCount] * CFG.H;
  waterCurrentY = lerp(waterCurrentY, waterTargetY, CFG.WATER_LERP_SPEED);

  waterTime = time;

  // Water color: lerp between idle and active based on button count
  const waterRgb = [
    lerp(RGB_WATER_IDLE[0], RGB_WATER_ACTIVE[0], activeCount / 8),
    lerp(RGB_WATER_IDLE[1], RGB_WATER_ACTIVE[1], activeCount / 8),
    lerp(RGB_WATER_IDLE[2], RGB_WATER_ACTIVE[2], activeCount / 8),
  ];

  // Build wave points once — reused for fill, stroke, and deco clip
  const wavePoints = [];
  for (let x = 0; x <= CFG.W; x += 6) {
    const wave1 = Math.sin(x * CFG.WATER_WAVE_FREQ1 + time * 0.001 * CFG.WATER_WAVE_SPEED1) * CFG.WATER_WAVE_AMP1;
    const wave2 = Math.sin(x * CFG.WATER_WAVE_FREQ2 + time * 0.001 * CFG.WATER_WAVE_SPEED2) * CFG.WATER_WAVE_AMP2;
    wavePoints.push(x, waterCurrentY + wave1 + wave2);
  }

  // Draw water body (fill)
  ctx.fillStyle = rgbaToStr(waterRgb, CFG.WATER_FILL_ALPHA);
  ctx.beginPath();
  ctx.moveTo(0, CFG.H);
  for (let p = 0; p < wavePoints.length; p += 2) ctx.lineTo(wavePoints[p], wavePoints[p + 1]);
  ctx.lineTo(CFG.W, CFG.H);
  ctx.closePath();
  ctx.fill();

  // Draw surface highlight line (reuse same points)
  ctx.strokeStyle = rgbaToStr(waterRgb, CFG.WATER_LINE_ALPHA);
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(wavePoints[0], wavePoints[1]);
  for (let p = 2; p < wavePoints.length; p += 2) ctx.lineTo(wavePoints[p], wavePoints[p + 1]);
  ctx.stroke();

  // Expose wavePoints for the deco bubble clip (avoids recomputing)
  drawWater._wavePoints = wavePoints;

  // Update and draw water bubbles
  for (const b of waterBubbles) {
    b.update(waterCurrentY);
    if (b.y > waterCurrentY && b.y < CFG.H) {
      const wobble = Math.sin(time * b.wobbleFreq + b.wobblePhase) * b.wobbleAmp;
      ctx.fillStyle = rgbaToStr([255, 255, 255], 0.2);
      ctx.beginPath();
      ctx.arc(b.x + wobble, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
}

// ============================================================
// IDLE DECORATIVE CIRCLES
// ============================================================
class IdleDecorCircle {
  constructor() {
    this.x = Math.random() * CFG.W;
    this.y = Math.random() * CFG.H;
    this.r = CFG.IDLE_DECOR_MIN_R + Math.random() * (CFG.IDLE_DECOR_MAX_R - CFG.IDLE_DECOR_MIN_R);
    this.lineWidth = 1 + Math.random() * 1.5;
    this.alpha = 0.2 + Math.random() * 0.4;
    this.vx = (Math.random() - 0.5) * 0.15;
    this.vy = (Math.random() - 0.5) * 0.15;
  }

  update() {
    this.x += this.vx;
    this.y += this.vy;
    if (this.x < -50) this.x = CFG.W + 50;
    if (this.x > CFG.W + 50) this.x = -50;
    if (this.y < -50) this.y = CFG.H + 50;
    if (this.y > CFG.H + 50) this.y = -50;
  }
}

const idleDecorCircles = [];
for (let i = 0; i < CFG.IDLE_DECOR_COUNT; i++) {
  idleDecorCircles.push(new IdleDecorCircle());
}

function drawIdleDecorations(alpha) {
  for (const c of idleDecorCircles) {
    c.update();
    ctx.strokeStyle = rgbaToStr([255, 255, 255], c.alpha * alpha);
    ctx.lineWidth = c.lineWidth;
    ctx.beginPath();
    ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
    ctx.stroke();
  }
}

// ============================================================
// CENTER BUBBLE
// ============================================================
let centerBubbleAlpha = 0;
let centerBubbleRadius = 1080;  // only used by generated fallback
let centerBubbleY = CFG.H * 0.45;
let idleRotation = 0;
let lastCenterImgSet = null;  // remembers which PNG set was last shown

function drawCenterBubble(time) {
  let targetR, targetY, fillColor, textColor, text;

  if (currentState === STATE.IDLE) {
    targetR = 1080;
    targetY = CFG.H * 0.42;
    fillColor = CFG.COLOR_BUBBLE_IDLE;
    textColor = CFG.COLOR_BUBBLE_ACTIVE;
    text = 'Dank euch –\nfür die\nGesundheit\naller';
    centerBubbleAlpha = lerp(centerBubbleAlpha, 1, CFG.CENTER_BUBBLE_FADE_IN);
    idleRotation += CFG.IDLE_ROTATE_SPEED * 16;
  } else if (currentState === STATE.ACTIVE) {
    // No persistent center bubble in Active state — fade out and return
    centerBubbleAlpha = lerp(centerBubbleAlpha, 0, CFG.CENTER_BUBBLE_FADE_OUT);
    idleRotation += CFG.IDLE_ROTATE_SPEED * 16;
    if (centerBubbleAlpha < 0.01) return;
    // Keep last known targetR/targetY for smooth fade-out (use idle values)
    targetR = centerBubbleRadius;
    targetY = centerBubbleY;
    fillColor = CFG.COLOR_BUBBLE_IDLE;
    textColor = CFG.COLOR_BUBBLE_ACTIVE;
    text = '';
  } else { // FULL
    targetR = 280;
    targetY = CFG.H * 0.40;
    fillColor = CFG.COLOR_BUBBLE_ACTIVE;
    textColor = '#FFFFFF';
    text = 'Deine Daten\nfür die\nGesundheit\naller';
    centerBubbleAlpha = lerp(centerBubbleAlpha, 1, CFG.CENTER_BUBBLE_FADE_IN);
    idleRotation += CFG.IDLE_ROTATE_SPEED * 16;
  }

  centerBubbleRadius = lerp(centerBubbleRadius, targetR, 0.04);
  centerBubbleY = lerp(centerBubbleY, targetY, 0.04);

  const cx = CFG.W / 2;
  const cy = centerBubbleY;
  const r  = centerBubbleRadius;

  ctx.save();
  ctx.globalAlpha = centerBubbleAlpha;

  // Determine if we use PNGs for this state
  let centerImgSet = null;
  if (CFG.USE_PNG_ASSETS) {
    if (currentState === STATE.IDLE) centerImgSet = CENTER_IMGS.idle;
    else if (currentState === STATE.FULL) centerImgSet = CENTER_IMGS.full;
    else centerImgSet = lastCenterImgSet; // ACTIVE: keep fading out what was shown before
  }
  if (centerImgSet && currentState !== STATE.ACTIVE) lastCenterImgSet = centerImgSet;
  const useCenterPng = centerImgSet &&
                       centerImgSet.bubble.complete &&
                       centerImgSet.bubble.naturalWidth > 0;

  if (useCenterPng) {
    if (centerImgSet === CENTER_IMGS.idle) {
      // Static base at natural resolution
      const bub = centerImgSet.bubble;
      if (bub.complete && bub.naturalWidth > 0) {
        ctx.drawImage(bub, cx - bub.naturalWidth / 2, cy - bub.naturalHeight / 2);
      }
      // Rotating layers — each at natural resolution, different speed/direction
      if (centerImgSet.layers && idleRotation !== 0) {
        for (let li = 0; li < centerImgSet.layers.length; li++) {
          const layer = centerImgSet.layers[li];
          if (!layer.complete || layer.naturalWidth === 0) continue;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(idleRotation * CFG.LAYER_SPEEDS[li]);
          ctx.drawImage(layer, -layer.naturalWidth / 2, -layer.naturalHeight / 2);
          ctx.restore();
        }
      } else if (centerImgSet.layers) {
        // Layers static (during fade-out in ACTIVE state)
        for (const layer of centerImgSet.layers) {
          if (layer.complete && layer.naturalWidth > 0)
            ctx.drawImage(layer, cx - layer.naturalWidth / 2, cy - layer.naturalHeight / 2);
        }
      }
      // Static text on top at natural resolution
      const txt = centerImgSet.text;
      if (txt.complete && txt.naturalWidth > 0) {
        ctx.drawImage(txt, cx - txt.naturalWidth / 2, cy - txt.naturalHeight / 2);
      }
    } else {
      // FULL image set at natural resolution
      const bub = centerImgSet.bubble;
      ctx.drawImage(bub, cx - bub.naturalWidth / 2, cy - bub.naturalHeight / 2);
      const txt = centerImgSet.text;
      if (txt.complete && txt.naturalWidth > 0) {
        ctx.drawImage(txt, cx - txt.naturalWidth / 2, cy - txt.naturalHeight / 2);
      }
    }
  } else {
    // Generated fallback
    if (currentState !== STATE.IDLE) {
      ctx.strokeStyle = CFG.COLOR_BUBBLE_RING;
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(cx, cy, r + 8, 0, Math.PI * 2);
      ctx.stroke();
    }

    ctx.fillStyle = fillColor;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();

    const lines = text.split('\n');
    const fontSize = Math.max(24, r * 0.28);
    ctx.font = `bold ${fontSize}px Arial, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillStyle = textColor;
    const lineHeight = fontSize * 1.25;
    const totalHeight = lines.length * lineHeight;
    const startY = cy - totalHeight / 2 + lineHeight / 2;
    for (let i = 0; i < lines.length; i++) {
      ctx.fillText(lines[i], cx, startY + i * lineHeight);
    }
  }

  ctx.restore();
}

// ============================================================
// TECH RINGS (FULL STATE)
// ============================================================
// ============================================================
// PNG BUBBLE SPAWN SYSTEM
// ============================================================
const activeBubbles = [];

const BUBBLE_TEXTS = [
  'Impfstoff\nentwickelt',
  'Diagnostik\nverbessert',
  'Therapie\noptimiert',
  'Prävention\ngestärkt',
  'Forschung\ngefördert',
  'Daten\nanalysiert',
  'Pflege\ninnoviert',
  'Versorgung\ngesichert',
];

function spawnPNGBubble(idx) {
  const x = CFG.W / 2;
  const y = CFG.H * 0.35 + Math.random() * CFG.H * 0.2;

  activeBubbles.push({
    x: x,
    y: y,
    startY: y,
    r: CFG.BUBBLE_START_RADIUS,
    text: BUBBLE_TEXTS[idx] || 'Beitrag\ngeleistet',
    startTime: performance.now(),
    idx: idx,
    imgs: BUBBLE_IMGS[idx] || null,
  });
}

function drawPNGBubbles(time) {
  for (let i = activeBubbles.length - 1; i >= 0; i--) {
    const b = activeBubbles[i];
    const elapsed = time - b.startTime;
    const progress = elapsed / CFG.BUBBLE_SPAWN_DURATION;

    if (progress > 1) {
      activeBubbles.splice(i, 1);
      continue;
    }

    // Position: drift down
    const driftY = progress * CFG.BUBBLE_DRIFT_Y;
    const currentY = b.startY + driftY;

    // Scale: shrink
    const scale = lerp(1, CFG.BUBBLE_SHRINK, progress);
    const currentR = b.r * scale;

    // Alpha: fade in, then out
    let bubbleAlpha = 1;
    let textAlpha = 1;

    // Fade in
    if (elapsed < CFG.BUBBLE_FADE_IN) {
      bubbleAlpha = elapsed / CFG.BUBBLE_FADE_IN;
      textAlpha = bubbleAlpha;
    }

    // Text fades out earlier
    const textFadeStart = CFG.BUBBLE_SPAWN_DURATION - CFG.BUBBLE_TEXT_FADE_OUT - CFG.BUBBLE_FADE_OUT;
    if (elapsed > textFadeStart) {
      textAlpha = clamp(1 - (elapsed - textFadeStart) / CFG.BUBBLE_FADE_OUT, 0, 1);
    }

    // Bubble fades out at end
    const bubbleFadeStart = CFG.BUBBLE_SPAWN_DURATION - CFG.BUBBLE_FADE_OUT;
    if (elapsed > bubbleFadeStart) {
      bubbleAlpha = clamp(1 - (elapsed - bubbleFadeStart) / CFG.BUBBLE_FADE_OUT, 0, 1);
    }

    ctx.save();

    const usePng = CFG.USE_PNG_ASSETS && b.imgs &&
                   b.imgs.bubble.complete && b.imgs.bubble.naturalWidth > 0;

    if (usePng) {
      // Use drawImage with explicit dst rect — no save/restore/scale/translate needed
      const bubImg = b.imgs.bubble;
      const bw = bubImg.naturalWidth * scale;
      const bh = bubImg.naturalHeight * scale;
      ctx.globalAlpha = bubbleAlpha;
      ctx.drawImage(bubImg, b.x - bw / 2, currentY - bh / 2, bw, bh);

      // Draw text PNG
      if (b.imgs.text.complete && b.imgs.text.naturalWidth > 0) {
        const txtImg = b.imgs.text;
        const tw = txtImg.naturalWidth * scale;
        const th = txtImg.naturalHeight * scale;
        ctx.globalAlpha = textAlpha;
        ctx.drawImage(txtImg, b.x - tw / 2, currentY - th / 2, tw, th);
      }
    } else {
      // Generated fallback
      ctx.globalAlpha = bubbleAlpha * 0.5;
      ctx.fillStyle = currentState === STATE.IDLE ? CFG.COLOR_BUBBLE_IDLE : CFG.COLOR_BUBBLE_ACTIVE;
      ctx.beginPath();
      ctx.arc(b.x, currentY, currentR, 0, Math.PI * 2);
      ctx.fill();

      // Ring
      ctx.strokeStyle = currentState === STATE.IDLE ? '#FFFFFF' : CFG.COLOR_BUBBLE_RING;
      ctx.lineWidth = 2;
      ctx.globalAlpha = bubbleAlpha * 0.7;
      ctx.beginPath();
      ctx.arc(b.x, currentY, currentR + 4, 0, Math.PI * 2);
      ctx.stroke();

      // Text
      ctx.globalAlpha = textAlpha;
      const fontSize = Math.max(14, currentR * 0.3);
      ctx.font = `bold ${fontSize}px Arial, sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillStyle = currentState === STATE.IDLE ? CFG.COLOR_BUBBLE_ACTIVE : '#FFFFFF';
      const lines = b.text.split('\n');
      const lh = fontSize * 1.2;
      const totalH = lines.length * lh;
      const sy = currentY - totalH / 2 + lh / 2;
      for (let li = 0; li < lines.length; li++) {
        ctx.fillText(lines[li], b.x, sy + li * lh);
      }
    }

    ctx.restore();
  }
}

// ============================================================
// MAIN RENDER LOOP
// ============================================================
let lastTime = 0;

// Per-frame timing (ms) — rolling averages exposed to dev overlay
const _perf = { bg: 0, idle: 0, water: 0, waterDeco: 0, center: 0, png: 0, frame: 0, fps: 0 };
const _perfAlpha = 0.1; // EMA smoothing (lower = slower/smoother)
let _lastFrameTime = 0;

function _t(fn) {
  const t0 = performance.now();
  fn();
  return performance.now() - t0;
}

function render(time) {
  requestAnimationFrame(render);

  const frameStart = performance.now();
  if (_lastFrameTime > 0) {
    const dt = frameStart - _lastFrameTime;
    _perf.fps += _perfAlpha * (1000 / dt - _perf.fps);
  }
  _lastFrameTime = frameStart;

  // Background color lerp
  const targetBg = currentState === STATE.IDLE ? RGB_IDLE_BG : RGB_ACTIVE_BG;
  currentBgRgb = lerpRgb(currentBgRgb, targetBg, CFG.BG_COLOR_LERP);

  // Clear with current bg
  ctx.fillStyle = rgbToStr(currentBgRgb);
  ctx.fillRect(0, 0, CFG.W, CFG.H);

  // Layer 1: Background network
  _perf.bg += _perfAlpha * (_t(() => drawBackground()) - _perf.bg);

  // Layer 2: Idle decorative circles (fade with state)
  if (currentState === STATE.IDLE) {
    _perf.idle += _perfAlpha * (_t(() => drawIdleDecorations(1)) - _perf.idle);
  }

  // Layer 3: Water
  _perf.water    += _perfAlpha * (_t(() => drawWater(time))                - _perf.water);
  _perf.waterDeco += _perfAlpha * (_t(() => drawWaterDecorationBubbles(time)) - _perf.waterDeco);

  // Layer 4: Center bubble
  _perf.center += _perfAlpha * (_t(() => drawCenterBubble(time)) - _perf.center);

  // Layer 5: PNG bubbles
  _perf.png += _perfAlpha * (_t(() => drawPNGBubbles(time)) - _perf.png);

  _perf.frame += _perfAlpha * (performance.now() - frameStart - _perf.frame);

  lastTime = time;
}

requestAnimationFrame(render);

// ============================================================
// DEV: Status overlay + on-screen buttons
// ============================================================
if (typeof BSSerialPort === 'undefined') {
  // Status info
  if (CFG.DEV_SHOW_INFO) {
  const devInfo = document.createElement('div');
  devInfo.style.cssText = 'position:fixed;top:10px;left:10px;color:#fff;font:12px monospace;background:rgba(0,0,0,0.5);padding:8px;border-radius:4px;z-index:999;pointer-events:none;';
  document.body.appendChild(devInfo);

  setInterval(() => {
    const stateNames = ['IDLE', 'ACTIVE', 'FULL'];
    const ms = (v) => v.toFixed(2) + 'ms';
    const bar = (v, max) => {
      const pct = Math.min(1, v / max);
      const color = pct > 0.6 ? '#f55' : pct > 0.3 ? '#fa0' : '#8f8';
      return `<span style="color:${color}">${ms(v)}</span>`;
    };
    devInfo.innerHTML = `
      State: ${stateNames[currentState]}<br>
      Buttons: ${buttons.map((b, i) => b ? (i+1) : '_').join(' ')}<br>
      Active: ${activeCount}/8<br>
      Water Y: ${Math.round(waterCurrentY)}<br>
      Bubbles: ${activeBubbles.length}<br>
      <hr style="border-color:#555;margin:3px 0">
      FPS: ${_perf.fps.toFixed(1)}<br>
      Frame total: ${bar(_perf.frame, 16)}<br>
      &nbsp;BG network: ${bar(_perf.bg, 8)}<br>
      &nbsp;Idle deco:  ${bar(_perf.idle, 4)}<br>
      &nbsp;Water:      ${bar(_perf.water, 4)}<br>
      &nbsp;WaterDeco:  ${bar(_perf.waterDeco, 4)}<br>
      &nbsp;Center bub: ${bar(_perf.center, 4)}<br>
      &nbsp;PNG bubs:   ${bar(_perf.png, 4)}<br>
      <span style="color:#aaa">Keys 1-8 or click buttons below</span>
    `;
  }, 100);
  } // DEV_SHOW_INFO

  // On-screen toggle buttons — avoids keyboard ghosting when testing many buttons at once
  if (CFG.DEV_SHOW_BUTTONS) {
  const btnRow = document.createElement('div');
  btnRow.style.cssText = 'position:fixed;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:999;';
  document.body.appendChild(btnRow);

  const devBtns = [];
  for (let i = 0; i < 8; i++) {
    const btn = document.createElement('button');
    btn.textContent = i + 1;
    btn.style.cssText = `
      width:44px;height:44px;border-radius:50%;border:2px solid #fff;
      background:rgba(0,0,0,0.4);color:#fff;font:bold 16px monospace;
      cursor:pointer;transition:background 0.1s;user-select:none;
    `;
    btn.addEventListener('click', (e) => {
      e.preventDefault();
      if (buttons[i]) onButtonUp(i); else onButtonDown(i);
    });
    btnRow.appendChild(btn);
    devBtns.push(btn);
  }

  // Keep button visuals in sync with state
  setInterval(() => {
    for (let i = 0; i < 8; i++) {
      devBtns[i].style.background = buttons[i] ? 'rgba(80,160,60,0.85)' : 'rgba(0,0,0,0.4)';
      devBtns[i].style.borderColor = buttons[i] ? '#90ee60' : '#fff';
    }
  }, 50);
  } // DEV_SHOW_BUTTONS
}
</script>
